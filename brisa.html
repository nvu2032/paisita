<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3934 · Brisa — Plan de Pagos</title>
<style>
:root {
  --bg:#fafaf8;--surface:#ffffff;--surface2:#f4f3ef;--border:#e2e1da;--border2:#d0cfc8;
  --text:#1a1a18;--text2:#5a5a56;--text3:#9a9a94;
  --gold:#b8922a;--gold-light:#c8a84b;--gold-bg:#fdf8ec;--gold-border:#d4aa55;
  --green:#1a7a4a;--green-bg:#e1f5ee;
  --red:#c0392b;--red-bg:#fcebeb;
  --mono:'Courier New',Courier,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#161614;--surface:#1e1e1c;--surface2:#252522;--border:#2e2e2a;--border2:#3a3a36;
    --text:#f0efe8;--text2:#9a9a92;--text3:#5a5a54;
    --gold:#d4a84b;--gold-light:#e8c86c;--gold-bg:#2a2310;--gold-border:#c8a84b;
    --green:#2db67c;--green-bg:#04342c;
    --red:#e05555;--red-bg:#501313;
  }
}
*{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;}
body{max-width:680px;margin:0 auto;padding:2rem 1.5rem 5rem;}

/* LOGIN */
.login-wrap{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;text-align:center;}
.login-eyebrow{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--text3);font-family:var(--mono);}
.login-title{font-size:28px;font-weight:600;letter-spacing:-.02em;color:var(--text);}
.login-sub{font-size:13px;color:var(--text2);max-width:300px;line-height:1.6;}
.login-btn{display:flex;align-items:center;gap:10px;padding:11px 22px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:14px;cursor:pointer;font-family:var(--sans);transition:all .15s;}
.login-btn:hover{background:var(--surface2);border-color:var(--text3);}
.login-btn svg{width:18px;height:18px;flex-shrink:0;}

/* HEADER */
.header{margin-bottom:2rem;}
.eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);font-family:var(--mono);margin-bottom:6px;}
.title{font-size:26px;font-weight:600;letter-spacing:-.02em;margin-bottom:2px;}
.subtitle{font-size:13px;color:var(--text2);}
.user-badge{font-size:11px;color:var(--green);margin-top:4px;font-family:var(--mono);}

/* PROGRESS HERO */
.progress-hero{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.75rem;margin-bottom:12px;}
.progress-label-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
.progress-amount{font-size:28px;font-weight:700;font-family:var(--mono);color:var(--gold-light);}
.progress-total{font-size:14px;color:var(--text3);font-family:var(--mono);}
.progress-pct{font-size:13px;color:var(--text2);font-family:var(--mono);}

.progress-track{height:10px;background:var(--surface2);border-radius:5px;margin-bottom:8px;position:relative;overflow:visible;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:5px;transition:width .6s ease;position:relative;}
.progress-fill::after{content:'';position:absolute;right:-1px;top:50%;transform:translateY(-50%);width:14px;height:14px;background:var(--gold-light);border-radius:50%;border:2px solid var(--bg);}
.milestone-marker{position:absolute;top:-4px;width:2px;height:18px;background:var(--green);border-radius:1px;}
.milestone-label{position:absolute;top:20px;font-size:10px;color:var(--green);font-family:var(--mono);white-space:nowrap;transform:translateX(-50%);}

.progress-sub{font-size:12px;color:var(--text3);font-family:var(--mono);}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:12px;}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.metric-label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);font-family:var(--mono);margin-bottom:6px;}
.metric-value{font-size:20px;font-weight:600;font-family:var(--mono);color:var(--text);}
.metric-value.gold{color:var(--gold);}
.metric-value.green{color:var(--green);}
.metric-sub{font-size:11px;color:var(--text3);margin-top:2px;}

/* MILESTONE CARD */
.milestone-card{background:var(--green-bg);border:1px solid var(--green);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:12px;}
.milestone-card-title{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--green);font-family:var(--mono);margin-bottom:8px;}
.milestone-card-body{font-size:14px;color:var(--text2);line-height:1.7;}
.milestone-card-body strong{color:var(--text);}
.milestone-progress{margin-top:10px;}
.milestone-track{height:6px;background:var(--surface);border-radius:3px;margin-top:6px;}
.milestone-fill{height:100%;background:var(--green);border-radius:3px;transition:width .6s ease;}
.milestone-pct{font-size:11px;color:var(--green);font-family:var(--mono);margin-top:4px;}

/* NEXT PAYMENT */
.next-card{background:var(--gold-bg);border:1px solid var(--gold);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;}
.next-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);font-family:var(--mono);margin-bottom:4px;}
.next-amount{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--gold-light);}
.next-date{font-size:13px;color:var(--text2);}
.next-right{text-align:right;}
.days-badge{font-size:12px;font-family:var(--mono);color:var(--gold);background:rgba(200,168,75,.15);padding:4px 10px;border-radius:6px;}

/* SECTION */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.section-title{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);font-family:var(--mono);}

/* PAYMENT LOG */
.payment-log{display:flex;flex-direction:column;gap:4px;}
.payment-row{display:grid;grid-template-columns:130px 90px 1fr 1fr auto;gap:8px;align-items:center;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:12px;}
.payment-row.paid{border-color:var(--border);}
.payment-row.pending{border-color:var(--border);opacity:.7;}
.payment-row.overdue{border-color:var(--red);background:var(--red-bg);}
.payment-row.future{opacity:.35;}
.payment-mes{font-family:var(--mono);color:var(--text2);}
.payment-cuota{font-family:var(--mono);font-weight:600;text-align:right;}
.payment-status{display:flex;align-items:center;gap:5px;}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot-paid{background:var(--green);}
.dot-pending{background:var(--gold);}
.dot-future{background:var(--text3);}
.payment-date{font-family:var(--mono);color:var(--text3);}
.mark-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:5px;padding:3px 8px;font-size:11px;cursor:pointer;color:var(--text2);font-family:var(--sans);}
.mark-btn:hover{border-color:var(--text3);color:var(--text);}
.mark-btn.paid-btn{background:rgba(45,182,124,.15);border-color:var(--green);color:var(--green);}

/* REPORT */
.report-section{margin-top:1.5rem;}
.report-output{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;font-size:13px;color:var(--text2);line-height:1.8;font-family:var(--mono);white-space:pre-wrap;display:none;}
.report-output.open{display:block;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}
.btn{height:34px;padding:0 16px;border-radius:7px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:12px;cursor:pointer;font-family:var(--sans);transition:all .15s;}
.btn:hover{background:var(--surface2);color:var(--text);}
.btn-gold{background:var(--gold-bg);color:var(--gold);border-color:var(--gold);}
.btn-gold:hover{opacity:.8;}
.btn-green{background:var(--green-bg);color:var(--green);border-color:var(--green);}
.btn-green:hover{opacity:.8;}

.error-bar{display:none;margin-bottom:1rem;padding:10px 14px;background:var(--red-bg);color:var(--red);border-radius:8px;font-size:13px;}
.loading-bar{height:2px;background:var(--gold);border-radius:1px;margin-bottom:1rem;animation:shimmer 1.2s infinite;display:none;}
@keyframes shimmer{0%{opacity:.3}50%{opacity:1}100%{opacity:.3}}

.divider{border:none;border-top:1px solid var(--border);margin:1.5rem 0;}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-wrap">
    <div>
      <div class="login-eyebrow">3934 family office · brisa</div>
      <div class="login-title" style="margin-top:6px;">Plan de Pagos</div>
    </div>
    <p class="login-sub">Conecta tu cuenta de Chakakuna para acceder al tracker.</p>
    <button class="login-btn" onclick="signIn()">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Conectar con Google
    </button>
  </div>
</div>

<div id="appContainer" style="display:none;">
  <div class="header">
    <div class="eyebrow">3934 family office · brisa</div>
    <div class="title">Larco 3934 — Plan de Pagos</div>
    <div class="subtitle" id="appSubtitle">Cargando...</div>
    <div class="user-badge" id="userBadge"></div>
  </div>

  <div id="loadingBar" class="loading-bar"></div>
  <div id="errorMsg" class="error-bar"></div>

  <div class="progress-hero">
    <div class="progress-label-row">
      <div>
        <div class="progress-amount" id="heroAmount">S/ 0</div>
        <div class="progress-pct" id="heroPct">0% amortizado</div>
      </div>
      <div class="progress-total" id="progressTotal">de S/ —</div>
    </div>
    <div class="progress-track" id="progressTrack">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
      <div class="milestone-marker" style="left:50%">
        <div class="milestone-label">50% · Jul 2029</div>
      </div>
    </div>
    <div class="progress-sub" id="progressSub"></div>
  </div>

  <div class="metrics" id="metrics"></div>

  <div class="milestone-card" id="milestoneCard"></div>

  <div class="next-card" id="nextCard"></div>

  <div class="divider"></div>

  <div class="section-header">
    <div class="section-title">Registro de pagos</div>
    <div class="btn-row">
      <button class="btn" onclick="toggleHistory()">ver historial completo</button>
    </div>
  </div>

  <div class="payment-log" id="paymentLog"></div>

  <div class="report-section">
    <div class="divider"></div>
    <div class="section-header">
      <div class="section-title">Reportes</div>
      <div class="btn-row">
        <button class="btn btn-gold" onclick="generateReport()">mensaje WhatsApp</button>
        <button class="btn btn-green" onclick="generarEstadoCuenta()">estado de cuenta PDF</button>
        <button class="btn btn-green" id="copyReportBtn" onclick="copyReport()" style="display:none">copiar</button>
      </div>
    </div>
    <div class="report-output" id="reportOutput"></div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script>
const CLIENT_ID = '779240650302-q68dttktik0dsp08smf8j365gu3gkb3g.apps.googleusercontent.com';
const SCOPES    = 'https://www.googleapis.com/auth/spreadsheets';
const SHEET_ID  = '1QdLqzdm6H4Ivm-C63TXGURm4O9pntEls7GFP_rbhjWw';

// Loaded from Sheet
let PLAN        = [];
let TOTAL_PRICE = 0;
let MILESTONE50 = 0;
let CFG         = {}; // all config fields

let accessToken     = null;
let tokenClient     = null;
let payments        = {};
let showFullHistory = false;

// ── AUTH ──────────────────────────────────────────────────────────────────────

window.onload = () => {
  const iv = setInterval(() => {
    if (window.google?.accounts?.oauth2) {
      clearInterval(iv);
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID, scope: SCOPES, callback: onToken,
      });
    }
  }, 100);
};

function signIn() {
  if (!tokenClient) { showError('Google aún no cargó.'); return; }
  tokenClient.requestAccessToken({ prompt:'' });
}

function onToken(resp) {
  if (resp.error) { showError('Error: ' + resp.error); return; }
  accessToken = resp.access_token;
  fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization:`Bearer ${accessToken}` } })
    .then(r=>r.json()).then(info => {
      const b = document.getElementById('userBadge');
      if (b) b.textContent = '● ' + (info.email||'conectado');
    }).catch(()=>{});
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appContainer').style.display = 'block';
  loadAll();
}

// ── SHEETS API ────────────────────────────────────────────────────────────────

async function sheetsGet(range) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?valueRenderOption=UNFORMATTED_VALUE`;
  const res = await fetch(url, { headers:{ Authorization:`Bearer ${accessToken}` }});
  if (!res.ok) throw new Error(`API ${res.status}`);
  return res.json();
}

async function sheetsSet(range, values) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`;
  await fetch(url, { method:'PUT', headers:{ Authorization:`Bearer ${accessToken}`, 'Content-Type':'application/json' },
    body: JSON.stringify({ values }) });
}

// ── LOAD ALL ──────────────────────────────────────────────────────────────────

async function loadAll() {
  showLoading(true);
  try {
    const [cfgResp, planResp, pagosResp] = await Promise.all([
      sheetsGet("'config'!A1:B30"),
      sheetsGet("'plan'!A1:E200"),
      sheetsGet("'pagos'!A1:E200"),
    ]);

    // Parse config
    const cfgRows = cfgResp.values || [];
    cfgRows.forEach(([k, v]) => { if (k) CFG[k] = v; });
    TOTAL_PRICE = parseFloat(CFG.precio_total) || 1100000;
    MILESTONE50 = parseFloat(CFG.milestone50)  || 550000;

    // Parse plan
    const planRows = planResp.values || [];
    PLAN = planRows.slice(1).map(r => ({
      key:       r[0] || '',
      nombre:    r[1] || '',
      cuota:     parseFloat(r[2]) || 0,
      fecha_venc:r[3] != null ? String(r[3]) : '',
      tipo:      r[4] || 'regular',
    })).filter(r => r.key);

    // Parse pagos
    const pagosRows = pagosResp.values || [];
    pagosRows.slice(1).forEach(([key, pagado, cuota_pagada, fecha_pago, notas]) => {
      if (key) payments[key] = {
        pagado:       pagado === true || pagado === 'TRUE',
        cuota_pagada: parseFloat(cuota_pagada) || 0,
        fecha_pago:   fecha_pago || '',
        notas:        notas || '',
      };
    });

    render();
  } catch(e) {
    showError('Error cargando datos: ' + e.message);
  }
  showLoading(false);
}

async function savePayment(key) {
  if (!accessToken) return;
  const p = payments[key];
  const rowNum = PLAN.findIndex(x => x.key === key) + 2;
  try {
    await sheetsSet(`'pagos'!A${rowNum}:E${rowNum}`, [[key, p.pagado, p.cuota_pagada, p.fecha_pago, p.notas]]);
  } catch(e) {}
}

// ── CALCULATIONS ──────────────────────────────────────────────────────────────

function getStats() {
  let totalPaid = 0, paidCount = 0, streak = 0, streakActive = true;
  const today = new Date();
  const todayKey = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;

  for (const item of PLAN) {
    const p = payments[item.key];
    const paid = p?.pagado;
    if (paid) { totalPaid += p.cuota_pagada || item.cuota; paidCount++; }
    if (item.key <= todayKey) {
      if (paid && streakActive) streak++;
      else if (!paid) streakActive = false;
    }
  }

  const pct = TOTAL_PRICE ? (totalPaid / TOTAL_PRICE * 100) : 0;
  const milestone50pct = MILESTONE50 ? (totalPaid / MILESTONE50 * 100) : 0;
  const remaining = TOTAL_PRICE - totalPaid;

  // Find next unpaid
  let nextItem = null;
  for (const item of PLAN) {
    if (!payments[item.key]?.pagado) { nextItem = item; break; }
  }

  // Days to next payment
  let daysToNext = null;
  if (nextItem) {
    const parts = String(nextItem.fecha_venc).split('/');
    const due = new Date(parts[2], parts[1]-1, parts[0]);
    daysToNext = Math.ceil((due - today) / 86400000);
  }

  // Milestone: months remaining to 50%
  let cumul = totalPaid;
  let monthsTo50 = 0;
  for (const item of PLAN) {
    if (cumul >= MILESTONE50) break;
    if (!payments[item.key]?.pagado) { cumul += item.cuota; monthsTo50++; }
  }

  return { totalPaid, paidCount, streak, pct, milestone50pct, remaining, nextItem, daysToNext, monthsTo50, totalPlan: PLAN.length };
}

// ── RENDER ────────────────────────────────────────────────────────────────────

function fmt(n) { return 'S/ ' + Number(n).toLocaleString('es-PE', {minimumFractionDigits:0, maximumFractionDigits:0}); }

function render() {
  const s = getStats();
  if (!PLAN.length) return;

  // Update dynamic subtitle and totals
  const sub = document.getElementById('appSubtitle');
  if (sub) sub.textContent = `${CFG.compradora||'Compradora'} · ${fmt(TOTAL_PRICE)} · Dic 2025 → Abr 2033`;
  const pt = document.getElementById('progressTotal');
  if (pt) pt.textContent = `de ${fmt(TOTAL_PRICE)}`;

  // Progress hero
  document.getElementById('heroAmount').textContent = fmt(s.totalPaid);
  document.getElementById('heroPct').textContent = s.pct.toFixed(1) + '% de tu propiedad amortizado';
  document.getElementById('progressFill').style.width = Math.min(s.pct, 100) + '%';
  document.getElementById('progressSub').textContent =
    `${fmt(s.remaining)} restantes · ${s.totalPlan - s.paidCount} cuotas por pagar`;

  // Metrics
  document.getElementById('metrics').innerHTML = `
    <div class="metric">
      <div class="metric-label">Pagado</div>
      <div class="metric-value gold">${fmt(s.totalPaid)}</div>
      <div class="metric-sub">${s.paidCount} de ${s.totalPlan} cuotas</div>
    </div>
    <div class="metric">
      <div class="metric-label">Racha</div>
      <div class="metric-value green">${s.streak} meses</div>
      <div class="metric-sub">consecutivos al día</div>
    </div>
    <div class="metric">
      <div class="metric-label">Propietaria</div>
      <div class="metric-value">${s.pct.toFixed(1)}%</div>
      <div class="metric-sub">de Larco 3934</div>
    </div>
    <div class="metric">
      <div class="metric-label">Meta final</div>
      <div class="metric-value">Abr 2033</div>
      <div class="metric-sub">al ritmo actual</div>
    </div>
  `;

  // Milestone card
  const m50pct = Math.min(s.milestone50pct, 100);
  const rentaActual = 2600, rentaFase2 = 800, ahorro = rentaActual - rentaFase2;
  document.getElementById('milestoneCard').innerHTML = `
    <div class="milestone-card-title">🎯 Próximo hito — Julio 2029</div>
    <div class="milestone-card-body">
      Cuando amortices <strong>S/ ${Number(MILESTONE50).toLocaleString()} (50%)</strong>, tu merced conductiva baja de
      <strong>S/ ${Number(CFG.merced_fase1||2600).toLocaleString()}</strong> a <strong>S/ ${Number(CFG.merced_fase2||800).toLocaleString()}</strong> por mes.
      Eso son <strong>S/ ${ahorro.toLocaleString()}/mes menos</strong> — <strong>S/ ${(ahorro*12).toLocaleString()} al año</strong> que se quedan contigo.
    </div>
    <div class="milestone-progress">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);font-family:var(--mono);">
        <span>${fmt(s.totalPaid)}</span><span>S/ 550,000</span>
      </div>
      <div class="milestone-track"><div class="milestone-fill" style="width:${m50pct}%"></div></div>
      <div class="milestone-pct">${m50pct.toFixed(1)}% hacia el hito · ~${s.monthsTo50} cuotas</div>
    </div>
  `;

  // Next payment card
  if (s.nextItem) {
    const isLate = s.daysToNext !== null && s.daysToNext < 0;
    const daysText = s.daysToNext === null ? '' :
      s.daysToNext > 0 ? `en ${s.daysToNext} días` :
      s.daysToNext === 0 ? 'hoy' : `hace ${Math.abs(s.daysToNext)} días`;
    document.getElementById('nextCard').innerHTML = `
      <div>
        <div class="next-label">Próximo pago</div>
        <div class="next-amount">${fmt(s.nextItem.cuota)}</div>
        <div class="next-date">${s.nextItem.fecha_venc} · ${s.nextItem.nombre}</div>
      </div>
      <div class="next-right">

      </div>

  }

  // Payment log
  renderLog();
}

function renderLog() {
  const today = new Date();
  const todayKey = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  const rows = showFullHistory ? PLAN : PLAN.slice(0, PLAN.findIndex(x=>!payments[x.key]?.pagado) + 4).filter(Boolean);
  const list = rows.length ? rows : PLAN.slice(0, 8);

  document.getElementById('paymentLog').innerHTML = list.map(item => {
    const p = payments[item.key];
    const paid = p?.pagado;
    const isFuture = item.key > todayKey && !paid;
    const cls = paid ? 'paid' : isFuture ? 'future' : 'pending';
    const dotCls = paid ? 'dot-paid' : isFuture ? 'dot-future' : 'dot-pending';
    const statusText = paid ? 'pagado' : isFuture ? 'pendiente' : 'por cobrar';
    const cuotaColor = item.cuota === 20000 ? 'color:var(--gold)' : '';

    return `
      <div class="payment-row ${cls}">
        <div class="payment-mes">${item.nombre}</div>
        <div class="payment-cuota" style="${cuotaColor}">${fmt(item.cuota)}</div>
        <div class="payment-status">
          <div class="status-dot ${dotCls}"></div>
          <span style="color:var(--text3)">${statusText}</span>
        </div>
        <div class="payment-date">${p?.fecha_pago || item.fecha_venc}</div>
        <div style="display:flex;gap:4px;">
          ${!paid && !isFuture
            ? `<button class="mark-btn" onclick="markPaid('${item.key}')">marcar pagado</button>`
            : paid
              ? `<button class="mark-btn paid-btn" onclick="unmarkPaid('${item.key}')">✓</button>
                 <button class="mark-btn" onclick="generarRecibo('${item.key}')" style="font-size:10px;">recibo</button>`
              : ''}
        </div>
      </div>`;
  }).join('');
}

function toggleHistory() {
  showFullHistory = !showFullHistory;
  renderLog();
  const btn = document.querySelector('[onclick="toggleHistory()"]');
  if (btn) btn.textContent = showFullHistory ? 'ocultar historial' : 'ver historial completo';
}

function markPaid(key) {
  const today = new Date();
  const dd = String(today.getDate()).padStart(2,'0');
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const yyyy = today.getFullYear();
  const item = PLAN.find(x=>x.key===key);
  payments[key] = { pagado:true, cuota_pagada:item.cuota, fecha_pago:`${dd}/${mm}/${yyyy}`, notas:'' };
  savePayment(key);
  render();
}

function unmarkPaid(key) {
  if (!confirm('¿Quitar este pago?')) return;
  payments[key] = { pagado:false, cuota_pagada:0, fecha_pago:'', notas:'' };
  savePayment(key);
  render();
}

  .next-box { border: 1px dashed #b8922a; border-radius: 4px; padding: 10px 14px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; background: #fdf8ee; }
  .next-label { font-size: 8pt; text-transform: uppercase; letter-spacing: .06em; color: #8a826e; margin-bottom: 3px; }
  .next-val { font-size: 13pt; font-weight: bold; font-family: 'Courier New', monospace; color: #b8922a; }

  /* Signatures */
  .signatures { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; margin-top: 28px; }
  .sig-line { border-top: 1px solid #1c1a14; padding-top: 7px; margin-top: 36px; font-size: 8.5pt; text-align: center; }
  .sig-name { font-weight: bold; font-size: 9pt; }

  /* Footer */
  .footer-note { margin-top: 16px; border-top: 0.5px solid #e8e3d6; padding-top: 10px; font-size: 7.5pt; color: #8a826e; line-height: 1.6; text-align: center; }

  @media print {
    body { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    .no-print { display: none !important; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="no-print" style="text-align:right;margin-bottom:16px;">
    <button onclick="window.print()" style="padding:8px 20px;background:#1c1a14;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;">
      Imprimir / Guardar PDF
    </button>
  </div>

  <div class="header">
    <div>
      <div class="entity-name">Administradora de Propiedades 3934</div>
      <div class="entity-sub">
        ${CFG.vendedor1||''} & ${CFG.vendedor2||''}<br>
        Representados por: ${CFG.apoderado||''} · DNI ${CFG.apoderado_dni||''}
      </div>
    </div>
    <div class="doc-meta">
      <div class="doc-type">Estado de Cuenta</div>
      <div class="doc-date">Emitido: ${fechaEmision}</div>
    </div>
  </div>

  <div class="doc-title">Estado de Cuenta — Compraventa a Plazos</div>

  <div class="parties">
    <div>
      <div class="party-label">Vendedores</div>
      <div class="party-name">${CFG.vendedor1||''}</div>
      <div class="party-sub">DNI: ${CFG.vendedor1_dni||''}</div>
      <div class="party-name" style="margin-top:6px;">${CFG.vendedor2||''}</div>
      <div class="party-sub">DNI: ${CFG.vendedor2_dni||''}</div>
    </div>
    <div>
      <div class="party-label">Compradora</div>
      <div class="party-name">${CFG.compradora||''}</div>
      <div class="party-sub">DNI: ${CFG.compradora_dni||''}</div>
    </div>
  </div>

  <div class="property-box">
    <strong>Inmueble:</strong> Jr. Víctor Larco Herrera 3934, Calle 8 Mz. U Lt. 22, Urb. Panamericana Norte, Los Olivos, Lima<br>
    <strong>Partida SUNARP:</strong> ${CFG.partida||''} &nbsp;·&nbsp; <strong>Precio total:</strong> ${fmtNum(TOTAL_PRICE)} &nbsp;·&nbsp; <strong>Contrato:</strong> ${CFG.fecha_contrato||''}
  </div>

  <div class="summary-grid">
    <div class="sum-box">
      <div class="sum-label">Precio total</div>
      <div class="sum-val">${fmtNum(TOTAL_PRICE)}</div>
    </div>
    <div class="sum-box">
      <div class="sum-label">Amortizado</div>
      <div class="sum-val green">${fmtNum(s.totalPaid)}</div>
    </div>
    <div class="sum-box">
      <div class="sum-label">Pendiente</div>
      <div class="sum-val gold">${fmtNum(saldo)}</div>
    </div>
    <div class="sum-box">
      <div class="sum-label">Avance</div>
      <div class="sum-val">${pct}%</div>
    </div>
  </div>

  <div class="progress-section">
    <div class="prog-label">Progreso del contrato</div>
    <div class="prog-outer">
      <div class="prog-fill" style="width:${Math.min(parseFloat(pct),100)}%"></div>
      <div class="prog-milestone" title="50% — Jul 2029"></div>
    </div>
    <div class="prog-labels">
      <span>S/ 0</span>
      <span style="color:#b8922a">${pct}% completado · ${s.paidCount} de ${PLAN.length} cuotas</span>
      <span>${fmtNum(TOTAL_PRICE)}</span>
    </div>
    <div class="milestone-note">
      Hito 50%: al amortizar S/ 550,000 la merced conductiva baja de S/ 2,600 a S/ 800/mes (ahorro S/ 1,800/mes).
      Avance hacia ese hito: <strong>${m50pct}%</strong> — estimado <strong>julio 2029</strong>.
    </div>
  </div>

  <div class="table-section">
    <div class="table-title" style="margin-bottom:0;">Historial de pagos</div>
    <table>
      <thead>
        <tr>
          <th style="width:30px">#</th>
          <th>Período</th>
          <th>Fecha de pago</th>
          <th>Cuota</th>
          <th>Acumulado</th>
        </tr>
      </thead>
      <tbody>
        ${paidRows}
      </tbody>
      <tfoot>
        <tr style="background:#f9f8f5;">
          <td colspan="3" style="padding:8px 10px;font-size:9pt;font-weight:bold;border-top:1px solid #1c1a14;">Total amortizado</td>
          <td style="padding:8px 10px;text-align:right;font-family:'Courier New',monospace;font-weight:bold;font-size:9pt;border-top:1px solid #1c1a14;">${fmtNum(s.totalPaid)}</td>
          <td style="padding:8px 10px;border-top:1px solid #1c1a14;"></td>
        </tr>
      </tfoot>
    </table>
  </div>

  ${nextItem ? `
  <div class="next-box">
    <div>
      <div class="next-label">Próxima cuota</div>
      <div style="font-size:10pt;color:#4a4535;">${nextItem.nombre} &nbsp;·&nbsp; Vence: ${nextItem.fecha_venc}</div>
    </div>
    <div class="next-val">${fmtNum(nextItem.cuota)}</div>
  </div>` : ''}

  <div class="signatures">
    <div>
      <div class="sig-line">
        <div class="sig-name">${CFG.apoderado||''}</div>
        <div style="font-size:8.5pt;color:#4a4535;">Apoderado · DNI 44812803</div>
      </div>
    </div>
    <div>
      <div class="sig-line">
        <div class="sig-name">${CFG.compradora||''}</div>
        <div style="font-size:8.5pt;color:#4a4535;">Compradora · DNI ${CFG.compradora_dni||''}</div>
      </div>
    </div>
  </div>

  <div class="footer-note">
    Este estado de cuenta resume el avance del Contrato Privado de Compraventa con Reserva de Propiedad celebrado el 30 de diciembre de 2025.
    La transferencia de propiedad quedará perfeccionada al cancelar ${fmtNum(TOTAL_PRICE)} y levantar la hipoteca inscrita (Cláusula 7ª).
    El voucher de depósito bancario es el único medio probatorio válido de cada pago (Cláusula 3ª).
  </div>

</div>
</body>
</html>`;

  const w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
}

function showLoading(on) { document.getElementById('loadingBar').style.display = on?'block':'none'; }
function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display='none', 5000);
}
</script>
</body>
</html>
